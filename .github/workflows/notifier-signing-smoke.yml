name: Notifier Signing Smoke Test

on:
  workflow_dispatch:
    inputs:
      skip_notarize:
        description: "Skip notarization and only validate Developer ID signing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  smoke-notifier:
    name: Build, Sign, Notarize ClaudeNotifier.app
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          if ! echo -n "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null; then
            echo -n "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

      - name: Build, sign, and optionally notarize ClaudeNotifier.app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd swift-notifier
          if [ "${{ inputs.skip_notarize }}" = "true" ]; then
            bash scripts/build-app.sh --ci --skip-notarize
          else
            bash scripts/build-app.sh --ci
          fi

      - name: Verify signature metadata
        run: |
          codesign -dv --verbose=4 swift-notifier/ClaudeNotifier.app || true
          codesign --display --entitlements :- swift-notifier/ClaudeNotifier.app || true

      - name: Create zip artifact
        run: |
          cd swift-notifier
          ditto -c -k --keepParent ClaudeNotifier.app ClaudeNotifier-smoke.app.zip
          ls -lh ClaudeNotifier-smoke.app.zip

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeNotifier-smoke
          path: swift-notifier/ClaudeNotifier-smoke.app.zip
          retention-days: 3
